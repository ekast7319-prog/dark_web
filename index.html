<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CityLink Services — Find trusted local services near you</title>
  <meta name="description" content="CityLink Services — local service directory for Accra and campuses. Find repairs, tutoring, tailoring, printing, food and more." />
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg">
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="#/">
        <div class="brand-logo">
          <span class="brand-main">CityLink</span>
          <span class="brand-sub">Services</span>
        </div>
      </a>
      <button id="navToggle" class="nav-toggle" aria-label="Open navigation">☰</button>
    </div>
  </header>

  <nav id="mobileNav" class="mobile-nav" aria-hidden="true">
    <div class="container nav-inner">
      <a class="nav-link" href="#/">Home</a>
      <a class="nav-link" href="#/add">Add Your Service</a>
    </div>
  </nav>

  <main id="app" class="container main">

    <!-- Home / Listing View -->
    <section id="view-home" class="view">
      <section class="hero">
        <div class="hero-media"></div>
        <div class="hero-content">
          <h1>Find trusted local services near you</h1>
          <p class="tagline">Fast. Local. Trusted — for students and residents in Accra.</p>
          <div class="search-row">
            <select id="citySelect" aria-label="Select city">
              <option value="All">All Cities</option>
              <option value="Accra">Accra</option>
              <option value="Cape Coast">Cape Coast</option>
              <option value="Takoradi">Takoradi</option>
              <option value="Kumasi">Kumasi</option>
              <option value="Sunyani">Sunyani</option>
            </select>
            <input id="searchInput" type="search" placeholder="Search by service, name, or location" aria-label="Search services" />
            <button id="clearSearch" class="clear-btn" aria-label="Clear search">✕</button>
          </div>
        </div>
      </section>

      <section class="filters">
        <div id="chips" class="chips" role="tablist" aria-label="Service categories">
          <!-- chips injected here -->
        </div>
      </section>

      <section class="results">
        <div id="cards" class="cards" aria-live="polite">
          <!-- cards injected here -->
        </div>
        <div id="noResults" class="no-results" hidden>
          <p>No results found. Try another keyword or category.</p>
        </div>
      </section>
    </section>

    <!-- Add Service View -->
    <section id="view-add" class="view" hidden>
      <h2>Add Your Service</h2>
      <form id="addForm" class="add-form" novalidate>
        <label>Business/Shop Name<input name="name" required /></label>
        <label>City
          <select name="city" required>
            <option value="Accra">Accra</option>
            <option value="Cape Coast">Cape Coast</option>
            <option value="Takoradi">Takoradi</option>
            <option value="Kumasi">Kumasi</option>
            <option value="Sunyani">Sunyani</option>
            <option value="Other">Other</option>
          </select>
        </label>
        <label>Service Type
          <select name="category" required>
            <option value="Repairs">Repairs</option>
            <option value="Tutoring">Tutoring</option>
            <option value="Tailoring">Tailoring / Fashion</option>
            <option value="Printing">Printing / Photocopy</option>
            <option value="Food">Food / Eateries</option>
            <option value="Miscellaneous">Miscellaneous</option>
          </select>
        </label>
        <label>Description<textarea name="description" rows="3" required></textarea></label>
        <label>Location<input name="location" required /></label>
        <label>Phone / WhatsApp<input name="phone" type="tel" required /></label>
        <div class="form-actions">
          <button type="submit" class="btn primary">Submit</button>
          <button type="button" id="cancelAdd" class="btn">Cancel</button>
        </div>
      </form>
      <div id="addSuccess" class="success" hidden>
        <p>Thank you — your service has been submitted (mock). It was added locally.</p>
        <button id="backHome" class="btn primary">Back to Home</button>
      </div>
    </section>

  </main>

  <script src="assets/js/app.js" defer></script>
</body>
</html>
